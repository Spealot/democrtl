// Spealot's easy demo control cfg
// 'exec democtrl' or 'dc' to use
// press 'x' to restore binds
//
// capslock		pause/play
// F1~F6 		fast forward 
// 1~6 			slow
// r			open demoui
// e 			spec certain player, edit [Player Name] below
// x			restore bind keys
// 0 			reset spectator target

alias democtrl_ON "" 
alias democtrl_OFF "host_writeconfig democtrl_restore"

democtrl_stat

alias democtrl_stat "democtrl_ON"

sv_allow_wait_command 1
cl_spec_carrieditems 0

bind 0 			"spec_player MatchaTV; spec_player SourceTV"
bind r 			"demoui"
bind e 			"spec_player [Player Name]"
bind capslock 	"demo_togglepause"
bind x			"alias democtrl_stat democtrl_OFF; exec democtrl_restore"

bind 1 "demo_timescale 1.0"
bind 2 SS2
bind 3 SS3
bind 4 SS4
bind 5 SS5
bind 6 SS6
unbind 7
unbind 8
unbind 9

bind F1 "demo_timescale 1.0"
bind F2 +F_hold2
bind F3 +F_hold3
bind F4 +F_hold4
bind F5 +F_hold5
bind F6 +F_hold6
unbind F7
unbind F8
unbind F9


alias +F_hold2 "demo_timescale 2.0"
alias +F_hold3 "demo_timescale 3.0"
alias +F_hold4 "demo_timescale 4.0"
alias +F_hold5 "demo_timescale 5.0"
alias +F_hold6 "demo_timescale 6.0"

alias -F_hold2 "demo_timescale 1.0"
alias -F_hold3 "demo_timescale 1.0"
alias -F_hold4 "demo_timescale 1.0"
alias -F_hold5 "demo_timescale 1.0"
alias -F_hold6 "demo_timescale 1.0"

alias FF2 "demo_timescale 2.0"
alias FF3 "demo_timescale 3.0"
alias FF4 "demo_timescale 4.0"
alias FF5 "demo_timescale 5.0"
alias FF6 "demo_timescale 6.0"

alias SS2 "demo_timescale 0.8"
alias SS3 "demo_timescale 0.6"
alias SS4 "demo_timescale 0.4"
alias SS5 "demo_timescale 0.2"
alias SS6 "demo_timescale 0.1"



